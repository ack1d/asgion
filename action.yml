name: "asgion — ASGI Protocol Check"
description: "Run ASGI protocol validation on your application"
branding:
  icon: "aperture"
  color: "gray-dark"

inputs:
  app:
    description: "ASGI app path (e.g. myapp:app)"
    required: true
  paths:
    description: "Space-separated paths to check (default: /)"
    required: false
    default: "/"
  strict:
    description: "Exit 1 on any violation"
    required: false
    default: "true"
  format:
    description: "Output format: text, json, sarif, junit"
    required: false
    default: "text"
  args:
    description: "Additional CLI arguments"
    required: false
    default: ""
  python-version:
    description: "Python version"
    required: false
    default: "3.12"
  asgion-version:
    description: "Pin asgion version (empty = latest)"
    required: false
    default: ""

outputs:
  report-file:
    description: "Path to report file (non-text formats)"
    value: ${{ steps.check.outputs.report-file }}
  exit-code:
    description: "asgion exit code"
    value: ${{ steps.check.outputs.exit-code }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install asgion
      shell: bash
      env:
        ASGION_VERSION: ${{ inputs.asgion-version }}
      run: |
        if [ -n "$ASGION_VERSION" ]; then
          pip install "asgion[cli]==$ASGION_VERSION"
        else
          pip install "asgion[cli]"
        fi

    - name: Run asgion check
      id: check
      shell: bash
      env:
        INPUT_APP: ${{ inputs.app }}
        INPUT_PATHS: ${{ inputs.paths }}
        INPUT_STRICT: ${{ inputs.strict }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        CMD="asgion check $INPUT_APP"

        for p in $INPUT_PATHS; do
          CMD="$CMD --path $p"
        done

        if [ "$INPUT_STRICT" = "true" ]; then
          CMD="$CMD --strict"
        fi

        if [ "$INPUT_FORMAT" != "text" ]; then
          REPORT="${RUNNER_TEMP}/asgion-report.${INPUT_FORMAT}"
          CMD="$CMD --format $INPUT_FORMAT --out $REPORT"
          echo "report-file=$REPORT" >> "$GITHUB_OUTPUT"
        fi

        if [ -n "$INPUT_ARGS" ]; then
          CMD="$CMD $INPUT_ARGS"
        fi

        set +e
        $CMD
        CODE=$?
        set -e
        echo "exit-code=$CODE" >> "$GITHUB_OUTPUT"
        exit $CODE
